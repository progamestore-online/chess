name: CI

# Verifies the code builds + tests pass on every push.
#
# Deploy is intentionally NOT wired up yet:
#   1. @progamestore/games isn't on npm, so `pnpm install` fails until the
#      scope is set up. The CI step below will start passing once it is.
#   2. The PGS platform doesn't have a shared game-ci.yml workflow yet
#      (the FGS equivalent is Pages-only and chess deploys as a Worker).
#      When the PGS shared workflow exists, this file becomes a thin
#      caller (~15 lines, same shape as the FGS callers).
#
# Until then, `wrangler deploy` is run manually from a dev machine after
# `pnpm build`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm build
      - run: pnpm test
